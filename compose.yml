services:
  minio:
    image: minio/minio:latest
    container_name: minio
    ports:
      - "9000:9000"
      - "9001:9001"
    restart: always
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: [ "CMD", "mc", "ready", "local" ]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - absolute_net

  amq:
    image: rabbitmq:3-management-alpine
    container_name: amq
    restart: always
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - amq_data:/var/lib/rabbitmq/
      - amq_data:/var/log/rabbitmq
    networks:
      - absolute_net


volumes:
  minio_data:
  amq_data:

networks:
  absolute_net:
    driver: bridge
